# OpenBlox Bot Configuration
# See the documentation for a full setup guide and troubleshooting   

[general]
# Your Roblox group ID (the number from the group URL)
group_id =

[presence]
# Bot status: online, idle, dnd, invisible
status = online
# Activity type: playing, watching, listening, competing, custom
# playing    = "Playing ..."
# watching   = "Watching ..."
# listening  = "Listening to ..."
# competing  = "Competing in ..."
# custom     = shows the text as-is
activity_type = watching
activity_text = For Commands

[verification]
# Set to true to enable the verification system
enabled = false 
# Channel ID where the verify button panel gets posted
channel_id =
# Discord role ID to give members after they verify
verified_role_id =

[ranking]
# Set to true to enable the /rank command
enabled = false
# Comma separated Discord role IDs that are allowed to use /rank
# Leave empty to let anyone with a group rank use it
allowed_roles =

[abuse_detection]
# Enable or disable abuse detection
# Blocks users who spam commands or show suspicious behavior
enabled = false
# Sensitivity: none, low, medium, high, ultra
# low    = lenient, 20 actions/min, 1 min cooldown
# medium = balanced, 12 actions/min, 3 min cooldown
# high   = strict, 8 actions/min, 10 min cooldown
# ultra  = very strict, 5 actions/min, 30 min cooldown
# Cooldowns scale up with repeated offenses
threshold = low
# Comma separated Discord user IDs exempt from abuse detection
exempt_user_ids =
# Comma separated Discord role IDs exempt from abuse detection
exempt_role_ids =

[logging]
# Channel IDs for each log type
# Leave blank to disable that log type
# Rank change logs
ranking_channel_id =
# Verification and unverification logs
verification_channel_id =
# Audit log view logs
moderation_channel_id =
# Abuse detection logs
abuse_channel_id =
